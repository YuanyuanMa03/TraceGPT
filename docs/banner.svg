<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>
  
  <!-- Title -->
  <text x="50" y="70" fill="#e6edf3" font-size="42" font-weight="800">Trace<tspan fill="url(#cyan)">GPT</tspan></text>
  <text x="50" y="100" fill="#8b949e" font-size="18">Every number has a story.</text>
  
  <!-- Token boxes -->
  <rect x="50" y="125" width="65" height="32" rx="6" fill="#1a2e1a" stroke="#3fb950" stroke-width="1.5"/>
  <text x="82" y="146" fill="#3fb950" font-size="14" text-anchor="middle" font-weight="600">"the"</text>
  
  <rect x="130" y="125" width="65" height="32" rx="6" fill="#1a2332" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="162" y="146" fill="#58a6ff" font-size="14" text-anchor="middle" font-weight="600">"cat"</text>
  
  <rect x="210" y="125" width="65" height="32" rx="6" fill="#2a1f1a" stroke="#d29922" stroke-width="1.5"/>
  <text x="242" y="146" fill="#d29922" font-size="14" text-anchor="middle" font-weight="600">"sat"</text>
  
  <!-- Arrow -->
  <text x="290" y="148" fill="#8b949e" font-size="20">→</text>
  
  <!-- Matrix viz -->
  <rect x="320" y="120" width="25" height="25" rx="2" fill="#3fb950" opacity="0.9"/>
  <rect x="348" y="120" width="25" height="25" rx="2" fill="#3fb950" opacity="0.3"/>
  <rect x="376" y="120" width="25" height="25" rx="2" fill="#3fb950" opacity="0.1"/>
  
  <rect x="320" y="148" width="25" height="25" rx="2" fill="#58a6ff" opacity="0.4"/>
  <rect x="348" y="148" width="25" height="25" rx="2" fill="#58a6ff" opacity="0.8"/>
  <rect x="376" y="148" width="25" height="25" rx="2" fill="#58a6ff" opacity="0.2"/>
  
  <!-- Arrow 2 -->
  <text x="415" y="148" fill="#8b949e" font-size="20">→</text>
  
  <!-- Attention arrows -->
  <path d="M 440 140 C 470 120 500 120 530 140" stroke="#3fb950" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M 440 145 C 480 155 510 155 530 145" stroke="#58a6ff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 440 150 C 460 170 510 170 530 150" stroke="#d29922" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- Arrow 3 -->
  <text x="545" y="148" fill="#8b949e" font-size="20">→</text>
  
  <!-- Prediction -->
  <rect x="575" y="120" width="80" height="40" rx="8" fill="#1a2e1a" stroke="#3fb950" stroke-width="2"/>
  <text x="615" y="146" fill="#3fb950" font-size="16" text-anchor="middle" font-weight="700">"on"</text>
  
  <!-- Badges -->
  <rect x="680" y="50" width="90" height="22" rx="11" fill="#306998"/>
  <text x="725" y="65" fill="#ffd43b" font-size="11" text-anchor="middle" font-weight="600">Pure NumPy</text>
  
  <rect x="680" y="80" width="90" height="22" rx="11" fill="#f85149" opacity="0.3"/>
  <text x="725" y="95" fill="#f85149" font-size="11" text-anchor="middle" font-weight="600">No PyTorch</text>
  
  <rect x="680" y="110" width="90" height="22" rx="11" fill="#1f3a5f"/>
  <text x="725" y="125" fill="#58a6ff" font-size="11" text-anchor="middle" font-weight="600">Hand-Verified</text>
  
  <!-- Formula -->
  <text x="50" y="185" fill="#bc8cff" font-size="12" font-family="monospace">formula → hand calculation → NumPy → word-labeled trace → understanding</text>
</svg>
